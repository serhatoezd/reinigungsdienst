<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard – RBS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark px-4">
      <span class="navbar-brand">RBS Admin</span>
      <button id="logoutBtn" class="btn btn-outline-light btn-sm">
        Ausloggen
      </button>
    </nav>

    <div class="container mt-4">
      <h5 class="mb-3">Kontaktanfragen</h5>

      <!-- Search Field -->
      <input
        type="text"
        id="suche"
        class="form-control mb-3"
        placeholder="Suchen nach Name, E-Mail..."
      />

      <!-- Requests Table -->
      <div class="table-responsive">
        <table class="table table-bordered table-hover bg-white">
          <thead class="table-dark">
            <tr>
              <th>Datum</th>
              <th>Name</th>
              <th>E-Mail</th>
              <th>Telefon</th>
              <th>Leistung</th>
              <th>Nachricht</th>
              <th>Aktion</th>
            </tr>
          </thead>
          <tbody id="tabelleBody">
            <tr>
              <td colspan="7" class="text-center">Lade Daten...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="../js/admin-dashboard.js"></script>
  </body>
</html>
